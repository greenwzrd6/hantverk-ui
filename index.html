<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svenssons Hantverk AB</title>
    <link rel="stylesheet" href="styles/style.css">
    <script type="importmap">
            {
                "imports": {
                    "vue": "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js"
                },
                "integrity": {
                    "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js": "sha384-Q3gg1uvxzo7j5a5zJyKw57OkLMyOhl1sGmQxxn63S3lsr8Ki3ACSKKSvK8zG//7D"
                }
            }
        </script>
    <script type="module" src="scripts/scripts.js"></script>
</head>

<body>
    <div class="container" id="app">
        <header-component :dynamic-date="dynamicDate" @go-back="goBack" @today="today" @go-forward="goForward"></header-component>
        <worker-info></worker-info>
        <status-info></status-info>
        <sort-worker @filter="selectedProfession = $event"></sort-worker>
        <schedule-dates :days="days"></schedule-dates>
        <worker-list :workers="selectedWorkers" :days="days"></worker-list>
    </div>
</body>

</html>
