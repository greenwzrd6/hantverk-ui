<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svenssons Hantverk AB</title>
    <link rel="stylesheet" href="styles/style.css">
    <script type="importmap">
        {
            "imports": {
                "vue": "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js"
            },
            "integrity": {
                "https://unpkg.com/vue@3.5.28/dist/vue.esm-browser.js": "sha384-Q3gg1uvxzo7j5a5zJyKw57OkLMyOhl1sGmQxxn63S3lsr8Ki3ACSKKSvK8zG//7D"
            }
        }
    </script>

</head>

<body>
    <div class="container" id="app">
        <header>
            <h1 class="h1-text">Bemanningsöversikt</h1>
            <p>Svenssons Hantverk AB</p>
            <p>21 apr. - 19 maj</p>
        </header>
        <div class="nav-buttons">
            <input class="föregående" type="button" value="Föregående" @click="goBack">
            <input class="idag" type="button" value="Idag" @click="today">
            <input class="nästa" type="button" value="Nästa" @click="goForward">
        </div>
        <div>
            <div>
                <h2>Hantverkare helt lediga</h2>
                <p>minst en hel ledig vecka</p>
            </div>
            <div>
                <h2>Hantverkare med 50% kvar</h2>
                <p>Kan ta ett jobb till</p>
            </div>
            <div>
                <h2></h2>
                <p></p>
            </div>
        </div>
        <worker-list :workers="workers" :days="days"></worker-list>
    </div>
    <script type="module" src="scripts/scripts.js"></script>
</body>

</html>
